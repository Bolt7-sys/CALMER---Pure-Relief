<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="description" content="CALMER — Premium cannabis wellness delivery. Live tracking, built-in chat, luxury shopping. Breathe, Unwind, Elevate." />

    <!-- PWA: installable on phones (Android + iOS) and desktop -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CALMER" />

    <!-- Social preview -->
    <meta property="og:title" content="CALMER — Breathe, Unwind, Elevate" />
    <meta property="og:description" content="Premium cannabis wellness delivered with luxury and care." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512.png" />

    <title>CALMER — Breathe, Unwind, Elevate</title>
    <!-- Fonts & icons are bundled locally via @fontsource + @fortawesome (see src/main.jsx) — no external CDN. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register the CALMER service worker (production builds serve /sw.js from public/)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () { /* non-fatal */ })
        })
      }
    </script>
  </body>
</html>
